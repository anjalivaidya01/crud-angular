<div class="container">

  <div class="form-container">

    <h2 class="form-title">Update Customer Details</h2>

    <form [formGroup]="updateCustomerForm">

      <!-- NAME -->
      <div class="form-group">
        <label>Name :</label>
        <input
          type="text"
          formControlName="name"
          [readonly]="!isEditMode">
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label>Email :</label>
        <input
          type="email"
          formControlName="email"
          [readonly]="!isEditMode">
      </div>

      <!-- PHONE -->
      <div class="form-group">
        <label>Phone Number :</label>
        <input
          type="tel"
          formControlName="phoneNo"
          [readonly]="!isEditMode">
      </div>

      <!-- USERNAME -->
      <div class="form-group">
        <label>Username :</label>
        <input
          type="text"
          formControlName="username"
          [readonly]="!isEditMode">
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label>Password :</label>
        <input
          type="password"
          formControlName="password"
          [readonly]="!isEditMode">
      </div>

      <!-- ROLE -->
      <div class="form-group">
        <label>Role :</label>
        <input
          type="text"
          formControlName="role"
          [readonly]="!isEditMode">
      </div>

      <div class="button-group">

        <!-- Edit Button -->
        <button
          type="button"
          (click)="enableEdit()">
          Edit
        </button>

        <!-- Update Button -->
        <button
          type="submit"
          (click)="updateCustomer()"
          [disabled]="!isEditMode">
          Update
        </button>

      </div>

    </form>

  </div>

</div>

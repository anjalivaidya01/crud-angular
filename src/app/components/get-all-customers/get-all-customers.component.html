
<button class="btn-new" routerLink="/customer">Post New Customer </button>
<button routerLink="/">
  Home
</button>

<h2>All Customers</h2>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>PhoneNo</th>
            <th>Profile</th>
            <th>Action</th>
            

        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let customer of customers">
            <td>{{customer.name}}</td>
            <td>{{customer.email}}</td>
            <td>{{customer.phoneNo}}</td>
            <td>{{customer.profile}}</td>

            <td>
                  <button class="btn-update" [routerLink]="['/update-customer',customer.id]">Update</button>
                  <button class="btn-delete" (click)="deleteCustomer(customer.id)">Delete</button>

            </td>
        </tr>
    </tbody>
</table>

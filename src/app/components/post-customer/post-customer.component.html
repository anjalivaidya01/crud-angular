

 
<div class="container">
     

  <div class="form-container">

    <h2 class="form-title">Post Customer Details</h2>

    <form [formGroup]="postCustomerForm">

      <!-- NAME -->
      <div class="form-group">

        <label>Name :</label>

        <input
          type="text"
          formControlName="name">

       

      </div>

      <!-- EMAIL -->
      <div class="form-group">

        <label>Email :</label>

        <input
          type="email"
          formControlName="email">


       
      </div>

      <!-- PHONE -->
      <div class="form-group">

        <label>Phone Number :</label>

        <input
          type="tel"
          formControlName="phoneNo">

       

       

      </div>

      <button type="submit" (click)="postCustomer()"> Post</button>
      <button routerLink="/" > Home </button>

    </form>

  </div>

</div>

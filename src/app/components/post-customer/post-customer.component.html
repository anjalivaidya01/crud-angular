

 
<div class="container">
     

  <div class="form-container">

    <h2 class="form-title">Post Customer Details</h2>

    <form [formGroup]="postCustomerForm">

      <!-- NAME -->
      <div class="form-group">

        <label>Name :</label>

        <input
          type="text"
          formControlName="name">

          <div class="error"
     *ngIf="postCustomerForm.get('name')?.touched &&
            postCustomerForm.get('name')?.hasError('required')">
  Name is required
</div>
       

      </div>

      <!-- EMAIL -->
      <div class="form-group">

        <label>Email :</label>

        <input
          type="email"
          formControlName="email">
           <div class="error"
     *ngIf="postCustomerForm.get('email')?.touched &&
            postCustomerForm.get('email')?.hasError('required')">
  email is required
</div>
<div class="error"
     *ngIf="postCustomerForm.get('email')?.touched &&
            postCustomerForm.get('email')?.hasError('email')">
  Enter a valid email
</div>


       
      </div>

      <!-- PHONE -->
      <div class="form-group">

        <label>Phone Number :</label>

        <input
          type="tel"
          formControlName="phoneNo">

       <div class="error"
     *ngIf="postCustomerForm.get('phoneNo')?.touched &&
            postCustomerForm.get('phoneNo')?.hasError('required')">
  Phone number is required
</div>

<div class="error"
     *ngIf="postCustomerForm.get('phoneNo')?.touched &&
            postCustomerForm.get('phoneNo')?.hasError('pattern')">
  Enter a valid 10-digit phone number
</div>

       

      </div>

      <!-- profile -->
      <div class="form-group">

        <label>Customer profile :</label>

        <input
          type="tel"
          formControlName="profile">

       <div class="error"
       *ngIf="postCustomerForm.get('profile')?.touched &&
       postCustomerForm.get('profile')?.hasError('required')">

       profile is required

         
       </div>

       

      </div>

      <button type="submit" (click)="postCustomer()"> Post</button>
      <br>
      <br>
      <button routerLink="/" > Home </button>

    </form>

  </div>

</div>

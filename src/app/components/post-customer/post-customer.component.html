<div class="container">

    <div class="form-container">

        <h2 class="form-title">Post Customer Details</h2>

        <form [formGroup]="postCustomerForm">

            <!-- NAME -->
            <div class="form-group">

                <label>Name :</label>

                <input type="text" formControlName="name">

                <div class="error" *ngIf="postCustomerForm.get('name')?.touched &&
                    postCustomerForm.get('name')?.hasError('required')">
                    Name is required
                </div>

            </div>

            <!-- EMAIL -->
            <div class="form-group">

                <label>Email :</label>

                <input type="email" formControlName="email">

                <div class="error" *ngIf="postCustomerForm.get('email')?.touched &&
                    postCustomerForm.get('email')?.hasError('required')">
                    Email is required
                </div>

                <div class="error" *ngIf="postCustomerForm.get('email')?.touched &&
                    postCustomerForm.get('email')?.hasError('email')">
                    Enter a valid email
                </div>

            </div>

            <!-- PHONE -->
            <div class="form-group">

                <label>Phone Number :</label>

                <input type="tel" formControlName="phoneNo">

                <div class="error" *ngIf="postCustomerForm.get('phoneNo')?.touched &&
                    postCustomerForm.get('phoneNo')?.hasError('required')">
                    Phone number is required
                </div>

                <div class="error" *ngIf="postCustomerForm.get('phoneNo')?.touched &&
                    postCustomerForm.get('phoneNo')?.hasError('pattern')">
                    Enter a valid 10-digit phone number
                </div>

            </div>

            <!-- USERNAME -->
            <div class="form-group">

                <label>Username :</label>

                <input type="text" formControlName="username">

                <div class="error" *ngIf="postCustomerForm.get('username')?.touched &&
                    postCustomerForm.get('username')?.hasError('required')">
                    Username is required
                </div>

            </div>

            <!-- PASSWORD -->
            <div class="form-group">

                <label>Password :</label>

                <input type="password" formControlName="password">

                <div class="error" *ngIf="postCustomerForm.get('password')?.touched &&
                    postCustomerForm.get('password')?.hasError('required')">
                    Password is required
                </div>

            </div>

            <!-- PROFILE -->
            <!-- <div class="form-group">

        <label>Customer Profile :</label>

        <input
          type="text"
          formControlName="profile">

      </div> -->

            <!-- ROLE -->
            <div class="form-group">

                <label>Role :</label>

                <select formControlName="role">

                    <option value="">Select Role</option>

                    <option value="ADMIN">ADMIN</option>

                    <option value="USER">USER</option>

                </select>

                <div class="error" *ngIf="postCustomerForm.get('role')?.touched &&
                    postCustomerForm.get('role')?.hasError('required')">
                    Role is required
                </div>

            </div>

            <!-- BUTTONS -->
            <button type="button" (click)="postCustomer()">

                Post

            </button>
            <!-- *ngIf="role=='ADMIN'" -->


            <br>
            <br>

            <button type="button" routerLink="/home">

                Home

            </button>

        </form>

    </div>

</div>
